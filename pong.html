<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Pong Game</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background-color: black;\n            margin: 0;\n        }\n        canvas {\n            border: 1px solid white;\n        }\n    </style>\n</head>\n<body>\n    <canvas id="pong" width="800" height="400"></canvas>\n    <script>\n        const canvas = document.getElementById('pong');\n        const ctx = canvas.getContext('2d');\n\n        const paddleWidth = 10, paddleHeight = 100;\n        const ballRadius = 10;\n\n        // Create the user paddle object\n        const userPaddle = {\n            x: 0,\n            y: canvas.height / 2 - paddleHeight / 2,\n            width: paddleWidth,\n            height: paddleHeight,\n            color: 'white',\n            dy: 0\n        };\n\n        // Create the computer paddle object\n        const computerPaddle = {\n            x: canvas.width - paddleWidth,\n            y: canvas.height / 2 - paddleHeight / 2,\n            width: paddleWidth,\n            height: paddleHeight,\n            color: 'white'\n        };\n\n        // Create the ball object\n        const ball = {\n            x: canvas.width / 2,\n            y: canvas.height / 2,\n            radius: ballRadius,\n            speed: 4,\n            dx: 4,\n            dy: 4,\n            color: 'white'\n        };\n\n        // Create the scoreboard\n        const score = {\n            user: 0,\n            computer: 0\n        };\n\n        // Draw everything on the canvas\n        function draw() {\n            // Clear the canvas\n            ctx.clearRect(0, 0, canvas.width, canvas.height);\n\n            // Draw the paddles\n            ctx.fillStyle = userPaddle.color;\n            ctx.fillRect(userPaddle.x, userPaddle.y, userPaddle.width, userPaddle.height);\n            ctx.fillStyle = computerPaddle.color;\n            ctx.fillRect(computerPaddle.x, computerPaddle.y, computerPaddle.width, computerPaddle.height);\n\n            // Draw the ball\n            ctx.fillStyle = ball.color;\n            ctx.beginPath();\n            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2, false);\n            ctx.closePath();\n            ctx.fill();\n\n            // Draw the score\n            ctx.fillStyle = 'white';\n            ctx.font = '32px Arial';\n            ctx.fillText(score.user, canvas.width / 4, canvas.height / 5);\n            ctx.fillText(score.computer, (canvas.width / 4) * 3, canvas.height / 5);\n        }\n\n        // Move the paddles\n        function movePaddles() {\n            if (userPaddle.y + userPaddle.height < canvas.height && userPaddle.y + userPaddle.dy >= 0) {\n                userPaddle.y += userPaddle.dy;\n            }\n            if (computerPaddle.y + computerPaddle.height < canvas.height) {\n                computerPaddle.y += (ball.y - (computerPaddle.y + computerPaddle.height / 2)) * 0.1;\n            }\n            // Prevent paddles from going out of bounds\n            userPaddle.y = Math.max(0, Math.min(userPaddle.y, canvas.height - userPaddle.height));\n            computerPaddle.y = Math.max(0, Math.min(computerPaddle.y, canvas.height - computerPaddle.height));\n        }\n\n        // Update ball position and check for collisions\n        function updateBall() {\n            ball.x += ball.dx;\n            ball.y += ball.dy;\n\n            // Check for wall collisions\n            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {\n                ball.dy *= -1;\n            }\n\n            // Check for paddle collisions\n            if (ball.x - ball.radius < userPaddle.x + userPaddle.width &&\n                ball.y > userPaddle.y && ball.y < userPaddle.y + userPaddle.height) {\n                ball.dx *= -1;\n            } else if (ball.x + ball.radius > computerPaddle.x &&\n                       ball.y > computerPaddle.y && ball.y < computerPaddle.y + computerPaddle.height) {\n                ball.dx *= -1;\n            }\n\n            // Check for scoring\n            if (ball.x + ball.radius < 0) {\n                score.computer++;\n                resetBall();\n            } else if (ball.x - ball.radius > canvas.width) {\n                score.user++;\n                resetBall();\n            }\n        }\n\n        // Reset the ball to the center of the canvas\n        function resetBall() {\n            ball.x = canvas.width / 2;\n            ball.y = canvas.height / 2;\n            ball.dx *= -1;\n        }\n\n        // Control the user paddle with the mouse and keyboard\n        canvas.addEventListener('mousemove', (event) => {\n            const rect = canvas.getBoundingClientRect();\n            const mouseY = event.clientY - rect.top;\n            userPaddle.y = mouseY - userPaddle.height / 2;\n            userPaddle.y = Math.max(0, Math.min(userPaddle.y, canvas.height - userPaddle.height));\n        });\n\n        document.addEventListener('keydown', (event) => {\n            if (event.key === 'ArrowUp') {\n                userPaddle.dy = -10;\n            } else if (event.key === 'ArrowDown') {\n                userPaddle.dy = 10;\n            }\n        });\n\n        document.addEventListener('keyup', () => {\n            userPaddle.dy = 0;\n        });\n\n        // The game loop\n        function gameLoop() {\n            draw();\n            movePaddles();\n            updateBall();\n            requestAnimationFrame(gameLoop);\n        }\n\n        gameLoop();\n    </script>\n</body>\n</html>
